# Slay the Spire AI Agent — Configuration
agent:
  # local_policy: 本地策略实时决策，DeepSeek 只作为老师/复盘接口保留。
  # llm: 兼容旧模式，每一步实时调用配置的 LLM 决策。
  decision_mode: "local_policy"

# Mod settings
mod:
  host: "127.0.0.1"
  port: 18888

# LLM settings
llm:
  # Backend: deepseek, ollama, claude
  backend: "deepseek"
  model: "deepseek-v4-flash"
  temperature: 0.3
  max_tokens: 128
  # Ollama: set ollama_url if using local LLM
  # ollama_url: "http://localhost:11434"

teacher:
  # DeepSeek 老师只在低频节点复盘，不参与实时动作选择。
  enabled: true
  review_on_run_end: true
  low_confidence_review: false

# Strategy configuration
strategy:
  # Current preset: balanced, aggressive, defensive, setup, or "custom"
  preset: "balanced"

  multiplayer:
    # 等待队友先行动，再根据其实际出牌重新规划；超时后主动行动以避免互相等待。
    wait_for_teammates: true
    wait_timeout_seconds: 20

  # Individual skill toggles (overrides preset)
  skills:
    focus_fire: true
    block_when_attacked: false
    save_potions: false
    no_overkill: true
    setup_first: false
    aoe_priority: false
    conserve_energy: false
    aggressive: false
    elite_path: false
    adaptive_hp_trade: true
    deck_coherence: true
    adaptive_pathing: true
    team_coordination: true

# Custom user-defined skills
# Each skill is a concrete instruction injected into the LLM prompt
custom_skills:
  # Example: my_custom_playstyle:
  #   name: "My Custom Style"
  #   description: "description of the skill"
  #   prompt_instruction: "instruction for the LLM"
  #   category: "combat"
  #   priority: 10
  #   enabled: true
